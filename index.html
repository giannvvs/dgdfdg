<script>
const BASE="https://site.api.espn.com/apis/site/v2/sports/soccer";

  // ══ CENTROAMÉRICA / CARIBE ══

  // ══ ELIMINATORIAS MUNDIAL ══
  "fifa.worldq.conmebol","fifa.worldq.concacaf",
  "fifa.worldq.afc","fifa.worldq.caf","fifa.worldq.ofc",
  // ══ ASIA ══
  "jpn.1","chn.1","ksa.1","ind.1","ind.2","aus.1","aus.w.1",

  // ══ ÁFRICA ══
  "caf.champions","caf.confederation","caf.nations",
  "nga.1","gha.1","ken.1","uga.1","zam.1","zim.1",

  "fifa.friendly","fifa.confederations"
];

let todos=[],ligasMap={},ligaActiva="todas";
let tkActivo=[];
let tkGuardados=JSON.parse(localStorage.getItem("gqvvs_tickets")||"[]");
let historial=JSON.parse(localStorage.getItem("gqvvsbet_v10")||"[]");
let pActual=null,timer=null,cval=30,busq="";
let fecha=new Date(),calOff=0;
let sCache={};

window.onload=()=>{renderHist();buildCal();cargar(true);actualizarBadgeTk();};

function buildCal(){
  const c=document.getElementById("cscr");c.innerHTML="";
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const mid=Math.floor(7/2);
  for(let i=0;i<7;i++){
    const d=new Date(hoy);d.setDate(hoy.getDate()+calOff+i-mid);
    const esH=d.getTime()===hoy.getTime();
    const esA=d.toDateString()===fecha.toDateString();
    const div=document.createElement("div");
    div.className="cday"+(esA?" act":"")+(esH?" hoy":"");
    div.innerHTML=`<span class="cdow">${DIAS[d.getDay()]}</span><span class="cnum">${d.getDate()}</span><span class="cmes">${MESES[d.getMonth()]}</span>`;
    div.onclick=()=>{fecha=new Date(d);buildCal();cargar(true);};
    c.appendChild(div);
  }
}
function mvCal(d){calOff+=d;const n=new Date(fecha);n.setDate(n.getDate()+d);fecha=n;buildCal();cargar(true);}
function fp(d){return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;}

async function cargar(sp){
  if(sp)document.getElementById("lp").innerHTML=`<div class="loading"><div class="spin"></div><br>Cargando partidos...</div>`;
  todos=[];ligasMap={};
  // SIEMPRE per-liga para garantizar lid correcto (evita nombres de liga incorrectos)
  const ids=new Set();
  const res=await Promise.allSettled(
    LIGAS.map(l=>fetch(`${BASE}/${l}/scoreboard?dates=${fp(fecha)}&limit=100`)
      .then(r=>r.ok?r.json().then(d=>({d,l})):null).catch(()=>null))
  );
  res.forEach(r=>{if(r.status==="fulfilled"&&r.value?.d?.events)procesarEvents(r.value.d.events,ids,r.value.l);});
  if(!todos.length&&sp){
    document.getElementById("lp").innerHTML=`<div class="errbx">⚠️ No se pudieron cargar los partidos.<br>Verifica tu conexión o intenta más tarde.<br><button class="btnref" style="margin-top:10px" onclick="cargar(true)">↻ Reintentar</button></div>`;
    return;
  }
  buildChips();renderTodo();startTimer();
}

function procesarEvents(evs,idsSet,lidForzado){
  evs.forEach(ev=>{
    if(idsSet&&idsSet.has(ev.id))return;
    if(idsSet)idsSet.add(ev.id);
    try{
      const comp=ev.competitions[0];
      const st=ev.status;

async function getSummary(p){
  if(sCache[p.id])return sCache[p.id];
  const urls=[
    `${BASE}/${p.lid}/summary?event=${p.id}`,
    `${BASE}/all/summary?event=${p.id}`
  ];
  for(const url of urls){
    try{
      const r=await fetch(url);
      if(r.ok){const d=await r.json();sCache[p.id]=d;return d;}
    }catch(e){}
  }
  return null;
}

function hsh(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return Math.abs(h);}
function rng(seed){let s=seed|0;return()=>{s=(Math.imul(1664525,s)+1013904223)|0;return(s>>>0)/0xffffffff;};}

function genAI(p){
  const r=rng(hsh(p.id+p.local+p.visit));
  const hS=0.38+r()*0.18,dS=0.22+r()*0.1,aS=1-hS-dS,t=hS+dS+aS;
  const pH=Math.round(hS/t*100),pD=Math.round(dS/t*100),pA=100-pH-pD;
  const btts=Math.round(42+r()*26),o25=Math.round(48+r()*24);
  const tG=(1.8+r()*1.6).toFixed(1),am=(2.2+r()*2.2).toFixed(1),co=(8+r()*4).toFixed(1);
  const oc=Math.round(38+r()*28),oco=Math.round(45+r()*28);
  return{pH,pD,pA,btts,o25,u25:100-o25,tG,am,co,oc,uco:100-oc,oco,uoco:100-oco,
    p1X:Math.min(98,pH+pD),pX2:Math.min(98,pD+pA),p12:Math.min(98,pH+pA)};
}

async function loadStats(p){
  const el=document.getElementById("dp-stats");
  el.innerHTML=`<div class="loading"><div class="spin"></div><br>Cargando estadísticas...</div>`;
  try{
    const d=await getSummary(p);if(!d)throw new Error("Sin datos");
    let hS=[],aS=[];
    const bx=d.boxscore||d.gamepackageJSON?.boxscore;
    if(bx?.teams?.length>=2){
      const h=bx.teams.find(x=>x.homeAway==="home")||bx.teams[0];
      const a=bx.teams.find(x=>x.homeAway==="away")||bx.teams[1];
      hS=h?.statistics||[];aS=a?.statistics||[];
    }
    if(!hS.length)throw new Error("ESPN no tiene estadísticas para este partido aún");
    const gs=(arr,n)=>{const s=arr.find(x=>x.name===n||x.abbreviation===n||x.label===n);return s?(s.displayValue??String(s.value??"0")):"0";};
    const pH=parseFloat(gs(hS,"possessionPct")||gs(hS,"possession"))||50;
    const pA=Math.round(100-pH),pHr=Math.round(pH);
    const ph=(v,va)=>{const n=parseFloat(v)||0,m=parseFloat(va)||0;return n===m?`<span class="pd">${v}</span>`:n>m?`<span class="pw">${v}</span>`:`<span class="pl">${v}</span>`;};
    const pa=(v,va)=>{const n=parseFloat(v)||0,m=parseFloat(va)||0;return n===m?`<span class="pd">${va}</span>`:m>n?`<span class="pw">${va}</span>`:`<span class="pl">${va}</span>`;};
    const rows=defs=>defs.map(d=>{const v=gs(hS,d.k),va=gs(aS,d.k);if(v==="0"&&va==="0")return"";return`<div class="srw"><div class="svl">${ph(v,va)}</div><div class="sn">${d.l}</div><div class="svr">${pa(v,va)}</div></div>`;}).join("");
    const TOP=[{k:"totalShots",l:"Tiros"},{k:"shotsOnTarget",l:"A puerta"},{k:"bigChances",l:"Grandes ocasiones"},{k:"accuratePasses",l:"Pases precisos"},{k:"fouls",l:"Faltas"},{k:"cornersWon",l:"Corners"}];

    el.innerHTML=`
      <div class="stbl"><div class="stblt">Top Estadísticas</div>
        <div class="pswp">
          <div style="text-align:center;font-size:.7rem;color:var(--s2);margin-bottom:6px;font-weight:600">Posesión</div>
          <div class="psbc"><div class="psl" style="width:${pHr}%">${pHr}%</div><div class="psr" style="width:${pA}%">${pA}%</div></div>
          <div class="pst"><span style="font-size:.7rem;font-weight:700">${p.local}</span><span style="font-size:.7rem;font-weight:700">${p.visit}</span></div>
        </div>${rows(TOP)||'<div style="padding:10px;text-align:center;color:var(--sb);font-size:.75rem">Sin datos</div>'}
      </div>
      <div class="stbl"><div class="stblt">Tiro</div>${rows(TIRO)||'<div style="padding:10px;text-align:center;color:var(--sb);font-size:.75rem">Sin datos</div>'}</div>

  if(sinTabla.has(p.lid)){
    el.innerHTML=`<div class="empty">🏆 Esta competición no tiene tabla de posiciones</div>`;return;
  }
  try{
    if(!p.lid||p.lid==="otro")throw new Error("Liga no identificada");
    let teamMap={};
    try{
      const rt=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${p.lid}/teams?limit=60`);
      if(rt.ok){
        const dt=await rt.json();
        const lista=dt.sports?.[0]?.leagues?.[0]?.teams||dt.teams||[];
        lista.forEach(t=>{const tm=t.team||t;if(tm.id)teamMap[String(tm.id)]={name:tm.shortDisplayName||tm.displayName||tm.name||"",logo:tm.logos?.[0]?.href||""};});
      }
    }catch(e){}
    const findEntries=(obj,d=0)=>{
      if(d>7||!obj||typeof obj!=="object")return[];
      if(Array.isArray(obj)){for(const x of obj){const r=findEntries(x,d+1);if(r.length)return r;}return[];}
      if(obj.entries&&Array.isArray(obj.entries)&&obj.entries.length>1)return obj.entries;
      for(const v of Object.values(obj)){const r=findEntries(v,d+1);if(r.length)return r;}
      return[];
    };
    const standLid=p.lid;
    const B2="https://site.api.espn.com/apis/v2/sports/soccer";
    const yr=new Date().getFullYear();
    let entries=[],groupName="";
    for(const url of [`${B2}/${standLid}/standings`,`${B2}/${standLid}/standings?season=${yr}`,`${B2}/${standLid}/standings?season=${yr-1}`]){
      if(entries.length)break;
      try{const r=await fetch(url);if(!r.ok)continue;const d=await r.json();if(!groupName)groupName=d.name||"";entries=findEntries(d);}catch(e){}
    }
    if(!entries.length)throw new Error("Tabla no disponible para "+p.liga);
    if(!groupName)groupName=p.liga;
    const getS=(stats,keys)=>{for(const k of keys){const s=stats.find(x=>x.name===k||x.abbreviation===k);if(s)return s.displayValue??String(s.value??"");}return"—";};
    let html=`<div class="tabbl"><div class="tabblt">${groupName}</div>
      <div class="tabr hdr"><div class="tpos">#</div><div class="ttm">Equipo</div>
      <div class="tnum">PJ</div><div class="tnum">G</div><div class="tnum">E</div><div class="tnum">P</div><div class="tnum">GD</div><div class="tpts">Pts</div></div>`;
    entries.forEach((e,i)=>{
      const tm=e.team||{};const stats=e.stats||[];
      const tid=String(tm.id||"");const mapped=teamMap[tid];
      const name=mapped?.name||tm.shortDisplayName||tm.displayName||tm.name||"—";
      const logo=mapped?.logo||tm.logos?.[0]?.href||"";
      const isH=tid===String(p.hid)||name===p.local;
      const isA=tid===String(p.aid)||name===p.visit;
      const pos=i+1;const pc=pos<=3?"t3":pos<=6?"t6":"";
      html+=`<div class="tabr ${isH?"hlh":isA?"hla":""}">
        <div class="tpos ${pc}">${pos}</div>
        <div class="ttm">${logo?`<img src="${logo}" style="width:16px;height:16px;object-fit:contain;flex-shrink:0" onerror="this.style.display='none'">`:`<div class="ttmp"></div>`}<span class="ttmn">${name}</span></div>
        <div class="tnum">${getS(stats,["gamesPlayed","GP"])}</div><div class="tnum">${getS(stats,["wins","W"])}</div>
        <div class="tnum">${getS(stats,["ties","D","draws"])}</div><div class="tnum">${getS(stats,["losses","L"])}</div>
        <div class="tnum">${getS(stats,["pointDifferential","GD"])}</div>
        <div class="tpts">${getS(stats,["points","PTS","pts"])}</div></div>`;
    });
    el.innerHTML=html+"</div>";
  }catch(err){el.innerHTML=`<div class="empty">🏆 ${err.message}</div>`;}
}

function calcProb(sels){
  if(!sels.length)return 0;
  // Análisis de correlación entre selecciones del mismo partido
  const byPartido={};
  sels.forEach(s=>{
    if(!byPartido[s.pid])byPartido[s.pid]=[];
    byPartido[s.pid].push(s.prob/100);
  });
  // Por partido: si hay múltiples picks del mismo partido, tomamos la mínima
  // (no son independientes entre sí — condicionalmente dependientes)
  let prob=1;
  Object.values(byPartido).forEach(probs=>{
    if(probs.length===1){
      prob*=probs[0];
    } else {
      // Picks del mismo partido: usar mínimo ajustado (son semi-dependientes)
      const minP=Math.min(...probs);
      const extra=probs.filter((_,i)=>i>0).reduce((a,b)=>a*b,1);
      prob*=minP*Math.pow(extra,0.5); // raíz cuadrada = correlación parcial
    }
  });
  // Penalización por cantidad: a más picks, más riesgo acumulado
  const n=sels.length;
  if(n>=3)prob*=Math.pow(0.97,n-2); // -3% acumulativo por pick adicional >2
  const result=Math.round(prob*1000)/10;
  return Math.min(result,99.9);
}

        <span class="tkgprob">Prob. combinada: ${tk.probTotal}%</span>
        <div class="tkgbtns">
          ${est==="pendiente"?`<button class="btn-tk-edit" onclick="setEstadoTicket(${i},'ganado')">✅ Ganado</button><button class="btn-tk-edit" onclick="setEstadoTicket(${i},'perdido')">❌ Perdido</button>`:`<button class="btn-tk-edit" onclick="setEstadoTicket(${i},'pendiente')">↩ Pendiente</button>`}
          <button class="btn-tk-del" onclick="borrarTicketGuardado(${i})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

</script>
</body>
</html>
